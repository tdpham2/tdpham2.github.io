- title: Experience
  type: time_table
  contents:
    - title: Postdoctoral Researcher
      institution: Argonne National Laboratory, Lemont, IL
      year: Dec 2024 - Present
      description:
        - Designed and deployed ChemGraph, a multi-agent AI system for planning, reasoning, and executing scientific workflows via natural language, enabling scalable execution across 512-Aurora-node workloads.
        - Built agentic AI systems interfacing with simulation codes (DFT/MC/MLIP), databases (APIs, RAG), HPC schedulers (PBS), and workflow engines (Parsl, EnsembleLauncher).
        - Developed an evaluation framework for agent performance in scientific applications, including early-stage assessment of tool-calling capabilities on the ALCF inference service.
        - Collaborated with scientists to integrate domain-specific tools into agentic workflows, enabling automated spectroscopy (UV-vis, XANES, IR) and materials discovery pipelines.
    - title: Graduate Researcher
      institution: Northwestern University, Evanston, IL
      year: Sep 2019 - Sep 2024
      description:
        - Developed AI-driven discovery systems combining simulation, ML, and optimization for autonomous materials design with experimental validation.
        - Designed sequential decision-making frameworks (Bayesian optimization, evolutionary algorithms) to optimize materials performance.
        - Co-developed the CoRE MOF Database (40,000+ materials) for data-driven workflows.

