cv:
  name: Thang D. Pham
  label: Postdoctoral Researcher, Argonne National Laboratory
  email: tpham@anl.gov
  address:
    city: Lemont
    region: IL
    postalCode: "60439"
  summary: >
    Postdoctoral researcher specializing in agentic AI systems for scientific discovery. Experienced in designing multi-agent workflows and scalable agentic pipelines on HPC systems, integrating AI with simulation, data, and scientific software to enable autonomous, large-scale discovery workflows.

  sections:
    Education:
      - institution: Northwestern University
        degree: Ph.D.
        area: Chemical and Biological Engineering
        start_date: "2019"
        end_date: "2024"
        location: Evanston, IL
        highlights:
          - Snurr group, Department of Chemical and Biological Engineering.
          - AI-driven materials discovery combining molecular simulation, machine learning, and optimization.
      - institution: Worcester Polytechnic Institute
        degree: B.S.
        area: Chemical Engineering
        start_date: "2015"
        end_date: "2019"
        location: Worcester, MA

    Experience:
      - company: Argonne National Laboratory
        position: Postdoctoral Researcher
        start_date: "2024"
        end_date: Present
        location: Lemont, IL
        highlights:
          - Designed and deployed ChemGraph, a multi-agent AI system for planning, reasoning, and executing scientific workflows via natural language, enabling scalable execution across 512-Aurora-node workloads.
          - Built agentic AI systems interfacing with simulation codes (DFT/MC/MLIP), databases (APIs, RAG), HPC schedulers (PBS), and workflow engines (Parsl, EnsembleLauncher).
          - Developed an evaluation framework for agent performance in scientific applications, including early-stage assessment of tool-calling capabilities on the ALCF inference service.
          - Collaborated with scientists to integrate domain-specific tools into agentic workflows, enabling automated spectroscopy (UV-vis, XANES, IR) and materials discovery pipelines.
      - company: Northwestern University
        position: Graduate Researcher
        start_date: "2019"
        end_date: "2024"
        location: Evanston, IL
        highlights:
          - Developed AI-driven discovery systems combining simulation, machine learning, and optimization for autonomous materials design with experimental validation.
          - Designed sequential decision-making frameworks, including Bayesian optimization and evolutionary algorithms, to optimize materials performance.
          - Co-developed the CoRE MOF Database of more than 40,000 materials for data-driven workflows.

    Open Source Projects:
